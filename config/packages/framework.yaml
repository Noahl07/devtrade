framework:
    secret: '%env(APP_SECRET)%'
    default_locale: fr 
    trusted_proxies: '127.0.0.1,REMOTE_ADDR'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-port', 'x-forwarded-proto', 'x-forwarded-prefix']

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        cookie_httponly: true
        cookie_lifetime: 86400
        gc_maxlifetime: 86400

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file