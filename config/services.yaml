# config/services.yaml

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ── Traduction automatique ──
    App\Service\TranslationCacheService:
        arguments:
            $provider:          '%env(TRANSLATION_PROVIDER)%'
            $myMemoryEmail:     '%env(MYMEMORY_EMAIL)%'
            $libreTranslateUrl: '%env(LIBRETRANSLATE_URL)%'
            $libreTranslateKey: '%env(LIBRETRANSLATE_KEY)%'

    # ── Locale subscriber ──
    App\EventSubscriber\LocaleSubscriber:
        arguments:
            $defaultLocale: '%kernel.default_locale%'
        tags:
            - { name: kernel.event_subscriber }