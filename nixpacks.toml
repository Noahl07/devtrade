[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.intl", "php82Extensions.opcache", "composer", "nodejs_20", "nginx"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php bin/console asset-map:compile --env=prod || true",
    "php bin/console cache:clear --env=prod",
    "php bin/console cache:warmup --env=prod",
    "php bin/console doctrine:migrations:migrate --no-interaction --env=prod"
]

[start]
cmd = "php-fpm -D && nginx -g 'daemon off;'"