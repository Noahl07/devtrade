################################
# Routes principales - devtrade #
################################

# --- Home ---
app_home:
    path: /
    controller: App\Controller\HomeController::index
    methods: [GET]

# --- Portfolio ---
app_portfolio:
    path: /portfolio
    controller: App\Controller\PortfolioController::index
    methods: [GET]

app_portfolio_project:
    path: /portfolio/{slug}
    controller: App\Controller\PortfolioController::show
    methods: [GET]

# --- Trading / Algo ---
app_trading:
    path: /trading
    controller: App\Controller\TradingController::index
    methods: [GET]

app_trading_waitlist:
    path: /trading/waitlist
    controller: App\Controller\TradingController::waitlist
    methods: [POST]

# --- Documentation ---
app_documentation:
    path: /documentation
    controller: App\Controller\DocumentationController::index
    methods: [GET]

app_documentation_category:
    path: /documentation/categorie/{slug}
    controller: App\Controller\DocumentationController::category
    methods: [GET]

app_documentation_article:
    path: /documentation/article/{accessLevel}/{slug}
    controller: App\Controller\DocumentationController::article
    methods: [GET]
    requirements:
        accessLevel: 'free|premium'

# --- Sécurité / Auth ---
app_login:
    path: /login
    controller: App\Controller\SecurityController::login
    methods: [GET, POST]

app_logout:
    path: /logout
    methods: [GET]

app_register:
    path: /register
    controller: App\Controller\RegistrationController::register
    methods: [GET, POST]

# --- Espace membre ---
app_compte:
    path: /compte
    controller: App\Controller\CompteController::index
    methods: [GET]

app_compte_profil:
    path: /compte/profil
    controller: App\Controller\CompteController::profil
    methods: [GET, POST]

# --- Contact ---
app_contact:
    path: /contact
    controller: App\Controller\ContactController::index
    methods: [GET, POST]

# --- Admin (à sécuriser via security.yaml) ---
app_admin:
    path: /admin
    controller: App\Controller\AdminController::index
    methods: [GET]

app_admin_projects:
    path: /admin/projets
    controller: App\Controller\AdminController::projects
    methods: [GET]

app_admin_project_new:
    path: /admin/projets/nouveau
    controller: App\Controller\AdminController::projectNew
    methods: [GET, POST]

app_admin_project_edit:
    path: /admin/projets/{id}/modifier
    controller: App\Controller\AdminController::projectEdit
    methods: [GET, POST]

app_admin_documents:
    path: /admin/documents
    controller: App\Controller\AdminController::documents
    methods: [GET]

app_admin_waitlist:
    path: /admin/waitlist
    controller: App\Controller\AdminController::waitlist
    methods: [GET]